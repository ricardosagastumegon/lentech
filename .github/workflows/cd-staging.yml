# ============================================================
# MONDEGA DIGITAL — Continuous Deployment to Staging
# Triggers: merge to main (after CI passes)
# ============================================================

name: CD — Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # Never cancel an in-progress deploy

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.22'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/mondega

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & push Docker images
  # ──────────────────────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: auth-service
            context: services/auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: wallet-service
            context: services/wallet-service
            dockerfile: services/wallet-service/Dockerfile
          - name: fx-engine
            context: services/fx-engine
            dockerfile: services/fx-engine/Dockerfile
          - name: compliance
            context: services/compliance
            dockerfile: services/compliance/Dockerfile
          - name: notification
            context: services/notification
            dockerfile: services/notification/Dockerfile
          - name: fiat-bridge
            context: services/fiat-bridge
            dockerfile: services/fiat-bridge/Dockerfile
          - name: card-service
            context: services/card-service
            dockerfile: services/card-service/Dockerfile
          - name: tx-engine
            context: services/tx-engine
            dockerfile: services/tx-engine/Dockerfile
          - name: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - name: admin
            context: apps/admin
            dockerfile: apps/admin/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging
            type=raw,value=latest

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  # ──────────────────────────────────────────────
  # 2. Deploy to staging (Fly.io or VPS via SSH)
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy services via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/mondega

            # Pull latest docker-compose files
            git pull origin main

            # Log into registry
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images and restart
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --remove-orphans

            # Run DB migrations
            docker compose -f docker-compose.staging.yml exec -T auth-service \
              pnpm typeorm:migrate || true

            # Health check — wait up to 60s
            echo "Waiting for services to be healthy..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/health > /dev/null; then
                echo "API healthy"
                break
              fi
              sleep 5
            done

            # Remove dangling images to save space
            docker image prune -f

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ *Staging deploy succeeded* — `${{ github.sha }}` by ${{ github.actor }}\n${{ github.event.head_commit.message }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 *Staging deploy FAILED* — `${{ github.sha }}` by ${{ github.actor }}\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
