# ============================================================
# MONDEGA DIGITAL — Continuous Integration
# Triggers: push + PR to main/develop
# Covers: apps/web and apps/admin (Next.js)
# Deploy: handled by Railway (nixpacks) — no Docker needed
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ──────────────────────────────────────────────
  # 1. Install & cache deps
  # ──────────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

  # ──────────────────────────────────────────────
  # 2. TypeScript type-check
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install (if cache miss)
        run: pnpm install --frozen-lockfile
      - name: Type check — web
        working-directory: apps/web
        run: pnpm typecheck
      - name: Type check — admin
        working-directory: apps/admin
        run: pnpm typecheck

  # ──────────────────────────────────────────────
  # 3. Build check (validates Next.js build)
  # ──────────────────────────────────────────────
  build:
    name: Build apps
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install (if cache miss)
        run: pnpm install --frozen-lockfile
      - name: Build web
        working-directory: apps/web
        run: pnpm build
      - name: Build admin
        working-directory: apps/admin
        run: pnpm build
