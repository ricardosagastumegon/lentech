# ============================================================
# MONDEGA DIGITAL — Docker Compose (Staging)
# Desplegado en servidor VPS via GitHub Actions CD
# ============================================================

version: '3.9'

networks:
  mondega-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:

x-nestjs-common: &nestjs-common
  restart: unless-stopped
  env_file: /opt/mondega/.env
  networks:
    - mondega-net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ---- Infraestructura ----

  postgres:
    image: postgres:16-alpine
    container_name: mondega-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mondega_db
      POSTGRES_USER: mondega_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - mondega-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mondega_user -d mondega_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: mondega-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mondega_admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mondega_dev}
    volumes:
      - mongo_data:/data/db
    networks:
      - mondega-net

  redis:
    image: redis:7.2-alpine
    container_name: mondega-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - mondega-net
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: mondega-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - mondega-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mondega-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - mondega-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: mondega-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic tx-execute
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic tx-completed
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic tx-failed
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic notifications
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 1 --topic kyc-events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 1 --topic compliance-events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 1 --topic fiat-bridge-events
      echo 'Topics ready.'
      "
    networks:
      - mondega-net
    restart: "no"

  # ---- Microservicios ----

  auth-service:
    image: ghcr.io/${GITHUB_OWNER}/mondega/auth-service:staging
    container_name: mondega-auth
    <<: *nestjs-common
    ports:
      - "3001:3001"

  wallet-service:
    image: ghcr.io/${GITHUB_OWNER}/mondega/wallet-service:staging
    container_name: mondega-wallet
    <<: *nestjs-common
    ports:
      - "3002:3000"

  fx-engine:
    image: ghcr.io/${GITHUB_OWNER}/mondega/fx-engine:staging
    container_name: mondega-fx
    <<: *nestjs-common
    ports:
      - "3003:3000"

  compliance:
    image: ghcr.io/${GITHUB_OWNER}/mondega/compliance:staging
    container_name: mondega-compliance
    <<: *nestjs-common
    ports:
      - "3004:3000"

  notification:
    image: ghcr.io/${GITHUB_OWNER}/mondega/notification:staging
    container_name: mondega-notification
    <<: *nestjs-common
    ports:
      - "3005:3000"

  fiat-bridge:
    image: ghcr.io/${GITHUB_OWNER}/mondega/fiat-bridge:staging
    container_name: mondega-fiat
    <<: *nestjs-common
    ports:
      - "3006:3000"

  card-service:
    image: ghcr.io/${GITHUB_OWNER}/mondega/card-service:staging
    container_name: mondega-card
    <<: *nestjs-common
    ports:
      - "3007:3000"

  tx-engine:
    image: ghcr.io/${GITHUB_OWNER}/mondega/tx-engine:staging
    container_name: mondega-tx-engine
    restart: unless-stopped
    env_file: /opt/mondega/.env
    networks:
      - mondega-net
    ports:
      - "8090:8090"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Apps ----

  web:
    image: ghcr.io/${GITHUB_OWNER}/mondega/web:staging
    container_name: mondega-web
    restart: unless-stopped
    env_file: /opt/mondega/.env
    networks:
      - mondega-net
    ports:
      - "3000:3000"

  admin:
    image: ghcr.io/${GITHUB_OWNER}/mondega/admin:staging
    container_name: mondega-admin
    restart: unless-stopped
    env_file: /opt/mondega/.env
    networks:
      - mondega-net
    ports:
      - "3010:3002"

  # ---- Nginx reverse proxy ----
  nginx:
    image: nginx:alpine
    container_name: mondega-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - mondega-net
    depends_on:
      - web
      - auth-service
